<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">
  <title>Rắn Săn Mồi – Đường Tàu Nguy Hiểm</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --green-neon: #39ff14;
      --nem-color: #ff6b35;
      --gold: #f1c40f;
      --bg: #07120a;
      --btn-size: 60px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'Baloo 2', cursive;
      color: #d4f5d4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: fixed;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 15% 85%, rgba(46,204,113,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 15%, rgba(57,255,20,0.04) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    #app {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 4px 6px;
      gap: 4px;
    }

    /* ===== HUD NGOÀI CANVAS ===== */
    #hud-outer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 720px;
      padding: 4px 8px;
      gap: 6px;
      flex-shrink: 0;
    }
    .hud-group {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(5,18,10,0.9);
      border: 1px solid rgba(57,255,20,0.25);
      border-radius: 8px;
      padding: 4px 10px;
    }
    .hud-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .hud-icon {
      font-size: 0.9rem;
    }
    .hud-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.48rem;
      color: #4a8a4a;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .hud-val {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--green-neon);
      text-shadow: 0 0 8px rgba(57,255,20,0.5);
    }
    .hud-val.gold { color: var(--gold); text-shadow: 0 0 8px rgba(241,196,15,0.5); }
    .hud-sep { width: 1px; height: 16px; background: rgba(57,255,20,0.2); }

    /* Thanh lá rau má */
    .leaf-bar {
      display: flex;
      gap: 2px;
      align-items: center;
    }
    .leaf-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      border: 1.5px solid #27ae60;
      background: transparent;
      transition: all 0.25s;
    }
    .leaf-dot.on {
      background: var(--green-neon);
      box-shadow: 0 0 6px var(--green-neon);
      transform: scale(1.3);
    }

    #pause-btn-outer {
      width: 34px; height: 34px;
      background: rgba(5,18,10,0.9);
      border: 2px solid rgba(57,255,20,0.4);
      color: rgba(57,255,20,0.85);
      border-radius: 50%;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      touch-action: manipulation;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }
    #pause-btn-outer:active {
      background: rgba(57,255,20,0.2);
      border-color: var(--green-neon);
      color: var(--green-neon);
    }

    /* ===== CANVAS ===== */
    #canvas-wrap {
      position: relative;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
      border: 2px solid rgba(57,255,20,0.28);
      box-shadow: 0 0 36px rgba(57,255,20,0.13), 0 0 70px rgba(57,255,20,0.06);
      overflow: hidden;
    }

    canvas#game {
      display: block;
      image-rendering: auto;
    }

    /* ===== OVERLAY MENU ===== */
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(3,10,5,0.95);
      border-radius: 10px;
      z-index: 20;
      gap: 10px;
      backdrop-filter: blur(5px);
      pointer-events: auto;
      padding: 20px;
    }
    #overlay h2 {
      font-size: 1.4rem; font-weight: 800;
      color: var(--green-neon);
      text-shadow: 0 0 20px rgba(57,255,20,0.7);
      letter-spacing: 2px;
    }
    #overlay .sub {
      font-size: 0.68rem; color: #5aaf5a;
      text-align: center; max-width: 320px; line-height: 1.5;
    }
    #overlay .score-big {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem; color: var(--gold);
      text-shadow: 0 0 8px rgba(241,196,15,0.5);
    }
    .reason {
      font-size: 0.8rem; color: #ff4444;
      text-shadow: 0 0 8px rgba(255,68,68,0.5);
      font-weight: 600; letter-spacing: 1px;
    }
    .legend {
      display: flex; gap: 10px;
      font-size: 0.58rem; color: #4a7a4a;
      font-family: 'Space Mono', monospace;
    }
    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      background: transparent;
      border: 2px solid var(--green-neon);
      color: var(--green-neon);
      font-family: 'Baloo 2', cursive;
      font-size: 0.85rem; font-weight: 700;
      padding: 6px 20px; border-radius: 8px;
      cursor: pointer; letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(57,255,20,0.5);
      box-shadow: 0 0 16px rgba(57,255,20,0.2);
      transition: all 0.18s; text-transform: uppercase;
      z-index: 30;
      position: relative;
    }
    .btn:hover, .btn:active {
      background: rgba(57,255,20,0.12);
      box-shadow: 0 0 28px rgba(57,255,20,0.4);
      transform: scale(1.05);
    }
    .btn.exit {
      border-color: #ff4444;
      color: #ff4444;
      text-shadow: 0 0 8px rgba(255,68,68,0.5);
      box-shadow: 0 0 16px rgba(255,68,68,0.2);
    }

    /* ===== THANH ÂM LƯỢNG ===== */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
    }
    .volume-icon {
      font-size: 1rem;
    }
    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 6px;
      background: rgba(57,255,20,0.2);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--green-neon);
      border: 2px solid #0a5a00;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(57,255,20,0.6);
    }

    /* ===== CONTROLS ===== */
    #controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 720px;
      padding: 0 16px;
      flex-shrink: 0;
      gap: 20px;
    }
    .controls-left {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .controls-right {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }
    .dpad-btn {
      width: var(--btn-size);
      height: var(--btn-size);
      border-radius: 16px;
      background: rgba(5,20,10,0.9);
      border: 2.5px solid rgba(57,255,20,0.35);
      color: var(--green-neon);
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.1s;
      box-shadow: 0 4px 14px rgba(0,0,0,0.6), 0 0 14px rgba(57,255,20,0.1);
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active {
      background: rgba(57,255,20,0.25);
      border-color: var(--green-neon);
      box-shadow: 0 0 26px rgba(57,255,20,0.55), 0 2px 6px rgba(0,0,0,0.5);
      transform: scale(0.92);
    }

    .kbd-hint {
      font-family: 'Space Mono', monospace;
      font-size: 0.42rem; color: #1e4a1e;
      letter-spacing: 1px; text-align: center;
      flex-shrink: 0;
      padding: 2px 0;
    }

    @media (min-width: 600px) { :root { --btn-size: 68px; } }
    @media (min-height: 500px) { :root { --btn-size: 64px; } }
    @media (max-width: 400px) { :root { --btn-size: 50px; } }
  </style>
</head>
<body>
<div id="app">
  <!-- HUD NGOÀI CANVAS -->
  <div id="hud-outer">
    <div class="hud-group">
      <div class="hud-item">
        <span class="hud-icon">⏱</span>
        <span class="hud-val gold" id="time-display">0:00</span>
      </div>
      <div class="hud-sep"></div>
      <div class="hud-item">
        <span class="hud-icon">★</span>
        <span class="hud-val" id="sc">0</span>
      </div>
      <div class="hud-sep"></div>
      <div class="hud-item">
        <span class="hud-icon">☘️</span>
        <div class="leaf-bar" id="leaf-bar">
          <div class="leaf-dot" id="l0"></div><div class="leaf-dot" id="l1"></div><div class="leaf-dot" id="l2"></div><div class="leaf-dot" id="l3"></div><div class="leaf-dot" id="l4"></div>
        </div>
      </div>
    </div>
    <button id="pause-btn-outer" title="Tạm dừng (P)">⏸</button>
  </div>

  <!-- CANVAS -->
  <div id="canvas-wrap">
    <canvas id="game"></canvas>

    <!-- OVERLAY MENU -->
    <div id="overlay">
      <h2 id="overlay-title">🐍 SẴN SÀNG?</h2>
      <div class="reason" id="overlay-reason" style="display:none;"></div>
      <div class="score-big" id="overlay-score" style="display:none;"></div>
      <div class="sub" id="overlay-sub">Ăn <b>☘️</b> rau má <b>+10 điểm</b><br>Đủ 5 lá → xuất hiện <b>🫔</b> nem chua<br>Tránh <b>🚂 đoàn tàu</b> trên đường ray!</div>
      <div class="legend" id="overlay-legend">
        <span>☘️ +10đ</span>
        <span>🫔 +30đ</span>
        <span>🚂 chết</span>
      </div>
      <!-- Thanh âm lượng (chỉ hiện khi pause) -->
      <div class="volume-row" id="volume-row" style="display:none;">
        <span class="volume-icon">🔊</span>
        <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="50">
        <span class="volume-icon">🔈</span>
      </div>
      <div class="btn-row" id="overlay-btns">
        <button class="btn" id="start-btn">BẮT ĐẦU</button>
      </div>
    </div>
  </div>

  <!-- ĐIỀU KHIỂN -->
  <div id="controls-row">
    <div class="controls-left">
      <button class="dpad-btn" id="btn-left" title="Trái">◀</button>
      <button class="dpad-btn" id="btn-right" title="Phải">▶</button>
    </div>
    <div class="controls-right">
      <button class="dpad-btn" id="btn-up" title="Lên">▲</button>
      <button class="dpad-btn" id="btn-down" title="Xuống">▼</button>
    </div>
  </div>

  <div class="kbd-hint">WASD / ↑↓←→ / P tạm dừng</div>
</div>

<script>
// ─── POLYFILL roundRect ────────────────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, radii) {
    let r = typeof radii === 'number' ? radii : (radii || 0);
    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
    this.beginPath();
    this.moveTo(x + r.tl, y);
    this.lineTo(x + w - r.tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
    this.lineTo(x + w, y + h - r.br);
    this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
    this.lineTo(x + r.bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
    this.lineTo(x, y + r.tl);
    this.quadraticCurveTo(x, y, x + r.tl, y);
    this.closePath();
    return this;
  };
}

// ─── AUDIO SYSTEM ──────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let masterGain = null;
let volume = 0.5;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new AudioCtx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = volume;
    masterGain.connect(audioCtx.destination);
  }
}

function setVolume(val) {
  volume = val / 100;
  if (masterGain) masterGain.gain.value = volume;
}

function playBeep(freq, duration, type='square', vol=0.08) {
  if (!audioCtx || !masterGain) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + duration);
}

function playEatSound() {
  playBeep(600, 0.08, 'square', 0.1);
  setTimeout(() => playBeep(900, 0.06, 'square', 0.08), 60);
}

function playNemSound() {
  playBeep(400, 0.1, 'triangle', 0.12);
  setTimeout(() => playBeep(600, 0.08, 'triangle', 0.1), 80);
  setTimeout(() => playBeep(800, 0.06, 'triangle', 0.08), 160);
}

function playTrainHorn() {
  playBeep(200, 0.3, 'sawtooth', 0.06);
  setTimeout(() => playBeep(180, 0.25, 'sawtooth', 0.05), 200);
}

function playDeathSound() {
  playBeep(150, 0.2, 'sawtooth', 0.15);
  setTimeout(() => playBeep(100, 0.3, 'sawtooth', 0.12), 150);
}

// Tiếng tàu chạy liên tục (nền)
let trainHumInterval = null;
function startTrainHum() {
  if (trainHumInterval) clearInterval(trainHumInterval);
  trainHumInterval = setInterval(() => {
    if (!dead && !paused && audioCtx && masterGain) {
      playBeep(60 + Math.random() * 20, 0.4, 'sine', 0.015);
    }
  }, 600);
}
function stopTrainHum() {
  if (trainHumInterval) { clearInterval(trainHumInterval); trainHumInterval = null; }
}

// ─── CONSTANTS ─────────────────────────────────────────────────────────
const CELL = 20;
const COLS = 36;
const ROWS = 26;
const W = COLS * CELL;
const H = ROWS * CELL;

const canvas = document.getElementById('game');
canvas.width  = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

// ─── Responsive sizing ─────────────────────────────────────────────────
function resizeLayout() {
  const availW = window.innerWidth - 12;
  const availH = window.innerHeight - 12;
  const reservedV = 50 + 75 + 18 + 12;
  const scaleW = availW / W;
  const scaleH = (availH - reservedV) / H;
  const scale = Math.min(scaleW, scaleH, 1.15);
  canvas.style.width  = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
  const btnSize = Math.min(68, Math.max(48, (availW * 0.11)));
  document.documentElement.style.setProperty('--btn-size', btnSize + 'px');
}

// ─── Game state ────────────────────────────────────────────────────────
let snake, dir, nextDir, score, best=0, leafCount, food, nemChua;
let trains, railRows, gameLoop, paused, dead, killReason, level, speed;
let floaties = [];
let gameStartTime = 0, elapsedSeconds = 0, timerInterval = null;
let hornTimer = null;

function init() {
  snake = [{x:16,y:13},{x:15,y:13},{x:14,y:13}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  score=0; leafCount=0; nemChua=null; level=1; speed=150;
  paused=false; dead=false; killReason=''; floaties=[];
  elapsedSeconds=0; gameStartTime=Date.now();
  railRows=[6,16];
  trains=railRows.map(r=>spawnTrainsForRow(r));
  food=null; spawnFood();
  updateHUD();
  startTimer();
  startTrainHum();
  startHornTimer();
}

function spawnTrainsForRow(row) {
  const d=Math.random()<0.5?1:-1;
  const count=1+Math.floor(Math.random()*2);
  return Array.from({length:count},(_,i)=>({
    x:d===1?-4-i*20:COLS+4+i*20, row, dir:d, len:4,
    baseSpeed:0.05+Math.random()*0.04, speed:0.05+Math.random()*0.04
  }));
}

function isOccupied(p) {
  for(let i=0;i<snake.length;i++) if(snake[i].x===p.x&&snake[i].y===p.y) return true;
  if(nemChua&&nemChua.x===p.x&&nemChua.y===p.y) return true;
  return false;
}

function spawnFood() {
  const valid=[];
  for(let y=0;y<ROWS;y++){
    if(railRows.includes(y)) continue;
    for(let x=0;x<COLS;x++){
      const p={x,y};
      if(!isOccupied(p)) valid.push(p);
    }
  }
  if(valid.length>0) food=valid[Math.floor(Math.random()*valid.length)];
  else {
    for(let y=0;y<ROWS;y++){
      if(railRows.includes(y)) continue;
      for(let x=0;x<COLS;x++){
        const p={x,y};
        if(!isOccupied(p)){ food=p; return; }
      }
    }
    food={x:5,y:5};
  }
}

function spawnNem() {
  if(nemChua) return;
  const valid=[];
  for(let y=0;y<ROWS;y++){
    if(railRows.includes(y)) continue;
    for(let x=0;x<COLS;x++){
      const p={x,y};
      if(!isOccupied(p)&&!(food&&food.x===x&&food.y===y)) valid.push(p);
    }
  }
  if(valid.length>0){
    nemChua=valid[Math.floor(Math.random()*valid.length)];
    nemChua._t=setTimeout(()=>{nemChua=null;},12000);
    playNemSound();
  }
}

function eq(a,b){return a.x===b.x&&a.y===b.y;}

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);
  gameStartTime=Date.now(); elapsedSeconds=0; updateTimerDisplay();
  timerInterval=setInterval(()=>{
    if(!paused&&!dead){
      elapsedSeconds=Math.floor((Date.now()-gameStartTime)/1000);
      updateTimerDisplay();
    }
  },500);
}

function startHornTimer(){
  if(hornTimer) clearInterval(hornTimer);
  hornTimer=setInterval(()=>{
    if(!dead&&!paused) playTrainHorn();
  },4000+Math.random()*5000);
}

function updateTimerDisplay(){
  const m=Math.floor(elapsedSeconds/60), s=elapsedSeconds%60;
  document.getElementById('time-display').textContent=`${m}:${s.toString().padStart(2,'0')}`;
}

function updateHUD(){
  document.getElementById('sc').textContent=score;
  if(score>best) best=score;
  for(let i=0;i<5;i++) document.getElementById('l'+i).classList.toggle('on',i<leafCount);
}

// ─── Drawing ───────────────────────────────────────────────────────────
function drawBg(){
  ctx.fillStyle='#07120a'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(46,204,113,0.03)'; ctx.lineWidth=1;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,H);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(W,y*CELL);ctx.stroke();}
}

function drawRails(){
  railRows.forEach(row=>{
    const y=row*CELL;
    ctx.fillStyle='rgba(80,60,30,0.5)'; ctx.fillRect(0,y+2,W,CELL-4);
    ctx.fillStyle='#6b4c2a';
    for(let x=0;x<W;x+=16) ctx.fillRect(x+1,y+4,11,CELL-8);
    ctx.strokeStyle='#c0b090'; ctx.lineWidth=3;
    ctx.shadowColor='#d4c8a0'; ctx.shadowBlur=4;
    [[y+7],[y+CELL-7]].forEach(([ry])=>{ctx.beginPath();ctx.moveTo(0,ry);ctx.lineTo(W,ry);ctx.stroke();});
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,40,0,0.04)'; ctx.fillRect(0,y,W,CELL);
  });
}

function drawTrain(t){
  const px=t.x*CELL, py=t.row*CELL, lw=t.len*CELL, lh=CELL, flip=t.dir<0;
  ctx.save(); ctx.translate(flip?px+lw:px,py); if(flip) ctx.scale(-1,1);
  const now=Date.now()/1000;
  for(let i=0;i<3;i++){
    const puff=((now*2.2+i*0.45)%1);
    ctx.globalAlpha=(1-puff)*0.45; ctx.fillStyle='#d8d8d8';
    ctx.beginPath(); ctx.arc(lw-8-puff*24,-3-puff*9,4+puff*3,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  const g=ctx.createLinearGradient(0,2,0,lh-2);
  g.addColorStop(0,'#f0d070'); g.addColorStop(1,'#a07028');
  ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(1,2,lw-2,lh-6,[4,14,4,4]); ctx.fill();
  ctx.strokeStyle='#7a5018'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='#e0b83a'; ctx.beginPath(); ctx.roundRect(lw-CELL+2,1,CELL-4,lh-4,[2,12,2,2]); ctx.fill();
  ctx.fillStyle='#9ae0ff'; ctx.shadowColor='#a0e8ff'; ctx.shadowBlur=6;
  for(let c=0;c<t.len-1;c++) ctx.fillRect(c*CELL+5,7,CELL-13,lh-14);
  ctx.fillRect(lw-CELL+7,6,CELL-14,lh-14); ctx.shadowBlur=0;
  ctx.fillStyle='#2a2a2a';
  for(let c=0;c<t.len;c++){
    [CELL*c+5,CELL*c+CELL-6].forEach(wx=>{
      ctx.beginPath(); ctx.arc(wx,lh-5,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#666'; ctx.beginPath(); ctx.arc(wx,lh-6,1.5,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#2a2a2a';
    });
  }
  ctx.restore();
}

function drawDanger(){
  if(!snake.length) return;
  trains.forEach(row=>row.forEach(t=>{
    const hx=t.dir>0?t.x+t.len:t.x;
    if(snake[0].y===t.row||Math.abs(snake[0].y-t.row)===1){
      const dist=t.dir>0?hx-snake[0].x:snake[0].x-hx;
      if(dist>0&&dist<6){
        const a=Math.max(0,1-dist/6)*(0.35+Math.sin(Date.now()/130)*0.25);
        ctx.fillStyle=`rgba(255,0,0,${a})`; ctx.fillRect(0,t.row*CELL,W,CELL);
      }
    }
  }));
}

function drawFood(){
  if(!food) return;
  const cx=food.x*CELL+CELL/2, cy=food.y*CELL+CELL/2;
  const bob=Math.sin(Date.now()/580)*2;
  ctx.shadowColor='#39ff14'; ctx.shadowBlur=14+Math.sin(Date.now()/600)*4;
  ctx.font=`${CELL-2}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('☘️',cx,cy+bob);
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(57,255,20,0.5)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,cy+bob,CELL/2-1,0,Math.PI*2); ctx.stroke();
}

function drawNem(){
  if(!nemChua) return;
  const cx=nemChua.x*CELL+CELL/2, cy=nemChua.y*CELL+CELL/2, t=Date.now()/380;
  ctx.shadowColor='#ff6b35'; ctx.shadowBlur=18;
  ctx.strokeStyle='rgba(255,107,53,0.55)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(cx,cy,CELL/2-1+Math.sin(t)*3,0,Math.PI*2); ctx.stroke();
  ctx.shadowBlur=0;
  const sc=1+Math.sin(t)*0.09;
  ctx.save(); ctx.translate(cx,cy); ctx.scale(sc,sc);
  ctx.font=`${CELL-2}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🫔',0,0); ctx.restore();
  ctx.fillStyle='#ff8855'; ctx.font='bold 8px Space Mono,monospace';
  ctx.textAlign='center'; ctx.fillText('x3',cx,nemChua.y*CELL+4);
}

function drawSnake(){
  if(!snake.length) return;
  snake.forEach((seg,i)=>{
    const px=seg.x*CELL+1, py=seg.y*CELL+1, s=CELL-2;
    if(i===0){
      ctx.shadowColor='#39ff14'; ctx.shadowBlur=14; ctx.fillStyle='#39ff14';
      ctx.beginPath(); ctx.roundRect(px,py,s,s,5); ctx.fill(); ctx.shadowBlur=0;
      const e=4; let e1x,e1y,e2x,e2y;
      if(dir.x===1){e1x=px+s-e;e1y=py+e;e2x=px+s-e;e2y=py+s-e;}
      else if(dir.x===-1){e1x=px+e;e1y=py+e;e2x=px+e;e2y=py+s-e;}
      else if(dir.y===-1){e1x=px+e;e1y=py+e;e2x=px+s-e;e2y=py+e;}
      else{e1x=px+e;e1y=py+s-e;e2x=px+s-e;e2y=py+s-e;}
      ctx.fillStyle='#001800'; ctx.beginPath(); ctx.arc(e1x,e1y,2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2x,e2y,2,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#ff2255'; ctx.lineWidth=1.5;
      const tx=seg.x*CELL+(dir.x===1?CELL:dir.x===-1?0:CELL/2);
      const ty=seg.y*CELL+(dir.y===1?CELL:dir.y===-1?0:CELL/2);
      ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx+dir.x*6,ty+dir.y*6);
      ctx.lineTo(tx+dir.x*9+dir.y*3,ty+dir.y*9+dir.x*3);
      ctx.moveTo(tx+dir.x*6,ty+dir.y*6); ctx.lineTo(tx+dir.x*9-dir.y*3,ty+dir.y*9-dir.x*3); ctx.stroke();
    }else{
      const f=i/snake.length;
      ctx.fillStyle=`rgb(${Math.floor(15+f*12)},${Math.floor(180-f*65)},${Math.floor(15+f*10)})`;
      ctx.strokeStyle='#166a30'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.roundRect(px+1,py+1,s-2,s-2,4); ctx.fill(); ctx.stroke();
      if(i%3===1){ctx.fillStyle='rgba(255,255,255,0.07)';ctx.beginPath();ctx.arc(px+s/2,py+s/2,3.5,0,Math.PI*2);ctx.fill();}
    }
  });
}

function drawFloaties(){
  floaties=floaties.filter(f=>f.life>0);
  floaties.forEach(f=>{f.y-=1.3;f.life-=0.028;ctx.globalAlpha=f.life;ctx.fillStyle=f.color;
    ctx.font='bold 13px Baloo 2,cursive';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(f.text,f.x,f.y);ctx.globalAlpha=1;});
}

function addFloaty(gx,gy,text,color){floaties.push({x:gx*CELL+CELL/2,y:gy*CELL,text,color,life:1});}

function draw(){
  drawBg(); drawDanger(); drawRails();
  trains.forEach(row=>row.forEach(drawTrain));
  drawFood(); drawNem(); drawSnake(); drawFloaties();
}

// ─── Game step ─────────────────────────────────────────────────────────
function step(){
  if(paused||dead) return;
  trains.forEach(row=>row.forEach(t=>{
    t.speed=t.baseSpeed+level*0.018; t.x+=t.dir*t.speed;
    if(t.dir>0&&t.x>COLS+3) t.x=-t.len-4;
    if(t.dir<0&&t.x+t.len<-3) t.x=COLS+4;
  }));
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){kill('💀 Đâm vào tường!');return;}
  if(snake.some(s=>eq(s,head))){kill('💀 Cắn phải đuôi!');return;}
  for(const row of trains) for(const t of row){
    const tl=Math.floor(Math.min(t.x,t.x)), tr=Math.ceil(t.x+t.len);
    if(head.y===t.row&&head.x>=tl&&head.x<tr){kill('🚂 Bị tàu cán!');return;}
  }
  snake.unshift(head);
  if(food&&eq(head,food)){
    score+=10; leafCount++; playEatSound();
    addFloaty(head.x,head.y,'+10 ☘️','#39ff14');
    if(leafCount>=5){leafCount=0;if(!nemChua) spawnNem();}
    spawnFood(); levelUp();
  }else if(nemChua&&eq(head,nemChua)){
    score+=30; playEatSound();
    addFloaty(head.x,head.y,'+30 🫔','#ff6b35');
    clearTimeout(nemChua._t); nemChua=null; levelUp();
  }else{snake.pop();}
  if(score>best) best=score;
  updateHUD();
}

function levelUp(){
  const nl=1+Math.floor(score/50);
  if(nl!==level){level=nl;speed=Math.max(55,150-(level-1)*12);
    clearInterval(gameLoop);gameLoop=setInterval(step,speed);
    addFloaty(snake[0].x,snake[0].y-2,`⬆️ Cấp ${level}`,'#f1c40f');}
}

function kill(reason){
  dead=true; killReason=reason; clearInterval(gameLoop);
  if(timerInterval) clearInterval(timerInterval);
  stopTrainHum(); if(hornTimer) clearInterval(hornTimer);
  playDeathSound();
  if(score>best) best=score; updateHUD();
  setTimeout(showGameOver, 500);
}

// ─── OVERLAY MENU ──────────────────────────────────────────────────────
function showGameOver(){
  const ov=document.getElementById('overlay');
  document.getElementById('overlay-title').textContent='💀 GAME OVER';
  document.getElementById('overlay-reason').style.display='block';
  document.getElementById('overlay-reason').textContent=killReason;
  document.getElementById('overlay-score').style.display='block';
  const m=Math.floor(elapsedSeconds/60), s=elapsedSeconds%60;
  document.getElementById('overlay-score').innerHTML=`Điểm: ${score} &nbsp;·&nbsp; Cấp: ${level} &nbsp;·&nbsp; ⏱ ${m}:${s.toString().padStart(2,'0')}<br>Kỷ lục: <b style="color:#f1c40f">${best}</b>`;
  document.getElementById('overlay-sub').style.display='none';
  document.getElementById('overlay-legend').style.display='none';
  document.getElementById('volume-row').style.display='none';
  document.getElementById('overlay-btns').innerHTML=`
    <button class="btn" id="restart-btn">CHƠI LẠI</button>
    <button class="btn exit" id="exit-btn">THOÁT</button>`;
  ov.style.display='flex';
  bindOverlayButtons();
}

function showPauseMenu(){
  const ov=document.getElementById('overlay');
  document.getElementById('overlay-title').textContent='⏸ TẠM DỪNG';
  document.getElementById('overlay-reason').style.display='none';
  document.getElementById('overlay-score').style.display='block';
  const m=Math.floor(elapsedSeconds/60), s=elapsedSeconds%60;
  document.getElementById('overlay-score').innerHTML=`Điểm: ${score} &nbsp;·&nbsp; Cấp: ${level} &nbsp;·&nbsp; ⏱ ${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('overlay-sub').style.display='none';
  document.getElementById('overlay-legend').style.display='none';
  document.getElementById('volume-row').style.display='flex';
  document.getElementById('volume-slider').value=Math.round(volume*100);
  document.getElementById('overlay-btns').innerHTML=`
    <button class="btn" id="resume-btn">TIẾP TỤC</button>
    <button class="btn exit" id="exit-btn">THOÁT</button>`;
  ov.style.display='flex';
  bindOverlayButtons();
  document.getElementById('volume-slider').addEventListener('input', function(){
    setVolume(this.value);
  });
}

function showStartMenu(){
  const ov=document.getElementById('overlay');
  document.getElementById('overlay-title').textContent='🐍 SẴN SÀNG?';
  document.getElementById('overlay-reason').style.display='none';
  document.getElementById('overlay-score').style.display='none';
  document.getElementById('overlay-sub').style.display='block';
  document.getElementById('overlay-sub').innerHTML='Ăn <b>☘️</b> rau má <b>+10 điểm</b><br>Đủ 5 lá → xuất hiện <b>🫔</b> nem chua<br>Tránh <b>🚂 đoàn tàu</b> trên đường ray!';
  document.getElementById('overlay-legend').style.display='flex';
  document.getElementById('volume-row').style.display='flex';
  document.getElementById('volume-slider').value=Math.round(volume*100);
  document.getElementById('overlay-btns').innerHTML=`<button class="btn" id="start-btn">BẮT ĐẦU</button>`;
  ov.style.display='flex';
  bindOverlayButtons();
  document.getElementById('volume-slider').addEventListener('input', function(){
    setVolume(this.value);
  });
}

function hideOverlay(){
  document.getElementById('overlay').style.display='none';
}

function bindOverlayButtons(){
  const startBtn=document.getElementById('start-btn');
  if(startBtn){ startBtn.addEventListener('click', startGame); startBtn.addEventListener('touchstart', e=>{e.preventDefault();startGame();}); }
  const restartBtn=document.getElementById('restart-btn');
  if(restartBtn){ restartBtn.addEventListener('click', startGame); restartBtn.addEventListener('touchstart', e=>{e.preventDefault();startGame();}); }
  const resumeBtn=document.getElementById('resume-btn');
  if(resumeBtn){ resumeBtn.addEventListener('click', resumeGame); resumeBtn.addEventListener('touchstart', e=>{e.preventDefault();resumeGame();}); }
  const exitBtn=document.getElementById('exit-btn');
  if(exitBtn){ exitBtn.addEventListener('click', exitGame); exitBtn.addEventListener('touchstart', e=>{e.preventDefault();exitGame();}); }
}

function startGame(){
  initAudio();
  hideOverlay();
  stopTrainHum();
  init();
  clearInterval(gameLoop);
  gameLoop=setInterval(step,speed);
}

function resumeGame(){
  hideOverlay();
  paused=false;
  startTrainHum();
  startHornTimer();
}

function exitGame(){
  hideOverlay();
  dead=true;
  paused=false;
  stopTrainHum();
  if(hornTimer) clearInterval(hornTimer);
  if(timerInterval) clearInterval(timerInterval);
  clearInterval(gameLoop);
  showStartMenu();
}

// ─── Render loop ───────────────────────────────────────────────────────
function renderLoop(){ draw(); requestAnimationFrame(renderLoop); }

// ─── Keyboard ──────────────────────────────────────────────────────────
const KMAP={
  ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
  w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0},
  W:{x:0,y:-1},S:{x:0,y:1},A:{x:-1,y:0},D:{x:1,y:0},
};
document.addEventListener('keydown', e=>{
  if(e.key==='p'||e.key==='P'){
    if(!dead){
      paused=!paused;
      if(paused){ stopTrainHum(); showPauseMenu(); }
      else{ hideOverlay(); startTrainHum(); startHornTimer(); }
    }
    e.preventDefault(); return;
  }
  if(e.key==='Escape'){
    if(!dead){ paused=true; stopTrainHum(); showPauseMenu(); }
    e.preventDefault(); return;
  }
  const nd=KMAP[e.key];
  if(nd&&!dead&&!paused&&!(nd.x===-dir.x&&nd.y===0)&&!(nd.y===-dir.y&&nd.x===0)){
    nextDir=nd; e.preventDefault();
  }
});

// ─── D-PAD ─────────────────────────────────────────────────────────────
function changeDirection(nd){
  if(!dead&&!paused&&!(nd.x===-dir.x&&nd.y===0)&&!(nd.y===-dir.y&&nd.x===0)){
    nextDir=nd;
  }
}
function addDpadListeners(id,dirObj){
  const btn=document.getElementById(id); if(!btn) return;
  const handler=e=>{e.preventDefault();e.stopPropagation();changeDirection(dirObj);if(navigator.vibrate)navigator.vibrate(6);};
  btn.addEventListener('mousedown',handler); btn.addEventListener('touchstart',handler,{passive:false});
}
addDpadListeners('btn-left',{x:-1,y:0}); addDpadListeners('btn-right',{x:1,y:0});
addDpadListeners('btn-up',{x:0,y:-1}); addDpadListeners('btn-down',{x:0,y:1});

// Pause button outer
const pauseBtnOuter=document.getElementById('pause-btn-outer');
pauseBtnOuter.addEventListener('click',e=>{
  e.preventDefault(); e.stopPropagation();
  if(!dead){
    paused=!paused;
    if(paused){ stopTrainHum(); showPauseMenu(); }
    else{ hideOverlay(); startTrainHum(); startHornTimer(); }
  }
});
pauseBtnOuter.addEventListener('touchstart',e=>{
  e.preventDefault(); e.stopPropagation();
  if(!dead){
    paused=!paused;
    if(paused){ stopTrainHum(); showPauseMenu(); }
    else{ hideOverlay(); startTrainHum(); startHornTimer(); }
  }
});

// Init volume slider
document.getElementById('volume-slider').addEventListener('input', function(){
  setVolume(this.value);
});

// ─── Khởi động ─────────────────────────────────────────────────────────
window.addEventListener('resize', resizeLayout);
window.addEventListener('orientationchange', ()=>setTimeout(resizeLayout,200));
resizeLayout();
initAudio();
init();
draw();
renderLoop();
showStartMenu();
</script>
